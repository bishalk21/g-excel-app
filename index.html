<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Sheets Clone</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app container">
      <!-- Page Actions - File, Edit, View, etc. -->
      <div class="page-actions-container actions-container">
        <div class="page-action">Home</div>
        <div class="page-action">File</div>
        <div class="page-action">Insert</div>
        <div class="page-action">Layout</div>
        <div class="page-action">Help</div>
      </div>

      <!-- Cell Actions - font, size, color, alignment -->
      <div class="cells-actions-container actions-container">
        <div class="cell-action">
          <span class="material-icons">content_cut</span>
        </div>
        <div class="cell-action">
          <span class="material-icons">content_copy</span>
        </div>
        <div class="cell-action">
          <span class="material-icons">content_paste</span>
        </div>
        <div class="cell-action">
          <span class="material-icons">format_shapes</span>
        </div>

        <select class="font-family-select font-select cell-action">
          <option value="">Font</option>
          <option value="Arial">Arial</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New">Courier New</option>
          <option value="Georgia">Georgia</option>
          <option value="sans-serif">Sans Serif</option>
        </select>

        <select class="font-size-select font-select cell-action">
          <option value="">Font Size</option>
          <option value="8">8</option>
          <option value="10">10</option>
          <option value="12">12</option>
          <option value="14">14</option>
          <option value="16">16</option>
          <option value="18">18</option>
          <option value="20">20</option>
        </select>

        <div class="bold cell-action">
          <span class="material-icons">format_bold</span>
        </div>
        <div class="italic cell-action">
          <span class="material-icons">format_italic</span>
        </div>
        <div class="underline cell-action">
          <span class="material-icons">format_underlined</span>
        </div>

        <div class="cell-action fill-color-action">
          <span class="material-icons">format_color_fill</span>
          <input type="color" class="fill-color-picker color-picker" />
        </div>
        <div class="cell-action text-color-action">
          <span class="material-icons">format_color_text</span>
          <input type="color" class="text-color-picker color-picker" />
        </div>
        <div class="cell-action alignment">
          <span class="left material-icons">format_align_left</span>
        </div>
        <div class="cell-action align-center alignment">
          <span class="center material-icons">format_align_center</span>
        </div>
        <div class="cell-action align-right alignment">
          <span class="right material-icons">format_align_right</span>
        </div>
      </div>

      <!-- Address Bar + Formula Bar -->
      <div class="formula-bar-container actions-container">
        <input type="text" class="address-bar" placeholder="A1" readonly />
        <div class="formula-bar">
          <span class="material-symbols-outlined"> function </span>
          <input
            type="text"
            placeholder="Enter formula or value"
            class="formula-input"
          />
        </div>
      </div>

      <!-- Grid Container - Cells (Columns, Rows, and top corner left dummy box) -->
      <div class="grid-container actions-container">
        <div class="cell-dummy"></div>
        <div class="address-columns-container"></div>
        <div class="cells-container">
          <div class="address-rows-container"></div>
        </div>
      </div>

      <!-- Sheets Container - Add sheets, switch between sheets -->
      <div class="sheets-container actions-container">
        <div class="add-sheet">
          <span class="material-symbols-outlined"> assignment_add </span>
        </div>
        <div class="sheet-folder active">Sheet 1</div>
        <div class="sheet-folder">Sheet 2</div>
        <div class="sheet-folder">Sheet 3</div>
      </div>
    </div>
    <script src="./grid.js"></script>
    <script src="./cellProperties.js"></script>
    <script src="./formulaRelation.js"></script>
  </body>
</html>
